name: tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.workspace }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: nuxt
            test_script: test:run
          - workspace: design-system
            test_script: test
    defaults:
      run:
        working-directory: ${{ matrix.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version-file: ${{ matrix.workspace }}/.nvmrc
          cache: pnpm
          cache-dependency-path: ${{ matrix.workspace }}/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm ${{ matrix.test_script }}
