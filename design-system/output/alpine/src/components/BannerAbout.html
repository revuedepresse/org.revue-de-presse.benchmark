<template x-if="!dismissed">
  <aside class="rdp-banner-about" role="region">
    <header class="rdp-banner-about__heading">
      <Icon name="introducing" x-bind:size="24"></Icon>
      <span><span x-html="t('footer.about.heading')"></span></span>
    </header>
    <p class="rdp-banner-about__body">
      <span x-html="t(bodyKey ?? 'footer.about.body')"></span>
    </p>
    <template x-if="!!dismissible">
      <button
        type="button"
        class="rdp-banner-about__close"
        x-bind:aria-label="t('actions.quit.label')"
        x-on:click="dismiss()"
      >
        ×
      </button>
    </template>
    <style>
      <span x-html="`
                .rdp-banner-about {
                  background: var(--banner-about-bg);
                  color: var(--banner-about-fg);
                  padding: var(--separation-2);
                  border-radius: var(--radius-default);
                  font-family: 'Roboto', sans-serif;
                  font-size: var(--font-size-content);
                  position: relative;
                }
                .rdp-banner-about__heading {
                  display: flex;
                  align-items: center;
                  gap: var(--separation-1);
                  font-family: 'Signika', sans-serif;
                  font-size: var(--font-size-status-text);
                  color: var(--color-brand-active);
                  margin-bottom: var(--separation-1);
                }
                .rdp-banner-about__body { margin: 0; }
                .rdp-banner-about__close {
                  position: absolute;
                  top: var(--separation-1);
                  right: var(--separation-1);
                  background: transparent;
                  border: none;
                  color: var(--color-content-font);
                  font-size: 24px;
                  cursor: pointer;
                }
              `"></span>
    </style>
  </aside>
</template>
<script>
  document.addEventListener("alpine:init", () => {
    Alpine.data("bannerAbout", () => ({
      dismissed: false,
      dismiss() {
        this.dismissed = true;
        props.onDismiss?.();
      },
    }));
  });
</script>
