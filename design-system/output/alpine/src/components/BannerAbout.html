<footer id="project" class="rdp-banner-about" x-data="bannerAbout()">
  <h2 class="rdp-banner-about__title rdp-banner-about__title--sharing">
    <Icon name="sharing" x-bind:size="24" x-bind:decorative="true"></Icon>
    <span><span x-html="t('footer.social.heading')"></span></span>
  </h2>
  <p class="rdp-banner-about__paragraph rdp-banner-about__paragraph--sharing">
    <span x-html="t('footer.sharing.body')"></span>
    <br />
    <br />
    <a
      class="rdp-banner-about__subscribe-to"
      rel="noreferrer nofollow noopener"
      x-bind:href="subscribeHref ?? 'https://bsky.app/profile/revue-de-presse.bsky.social'"
    >
      <span class="rdp-banner-about__subscription-label">
        <span x-html="t('footer.subscribe-to.label')"></span>
      </span>
    </a>
  </p>
  <h2 class="rdp-banner-about__title rdp-banner-about__title--introducing">
    <Icon name="introducing" x-bind:size="24" x-bind:decorative="true"></Icon>
    <span><span x-html="t('footer.about.heading')"></span></span>
  </h2>
  <p class="rdp-banner-about__paragraph">
    <a
      class="rdp-banner-about__outer-link"
      x-bind:href="legalNoticeHref ?? '/mentions-legales'"
      x-on:click="handleLegalClick($event)"
    >
      <span x-html="t('footer.about.privacy-policy')"></span>
    </a>
    <br />
    <a
      class="rdp-banner-about__outer-link"
      x-bind:href="contactHref ?? '/nous-contacter'"
      x-on:click="handleContactClick($event)"
    >
      <span x-html="t('footer.about.contact')"></span>
    </a>
    <br />
    <a
      class="rdp-banner-about__outer-link"
      x-bind:href="supportHref ?? '/nous-soutenir'"
      x-on:click="handleSupportClick($event)"
    >
      <span x-html="t('footer.about.support')"></span>
    </a>
    <br />
    <a
      class="rdp-banner-about__outer-link"
      x-bind:href="sourcesHref ?? '/sources'"
      x-on:click="handleSourcesClick($event)"
    >
      <span x-html="t('footer.about.sources')"></span>
    </a>
    <br />
  </p>
  <h2 class="rdp-banner-about__title rdp-banner-about__title--funding">
    <Icon name="funding" x-bind:size="24" x-bind:decorative="true"></Icon>
    <span><span x-html="t('footer.pro-bono.heading')"></span></span>
  </h2>
  <p class="rdp-banner-about__paragraph">
    <span x-html="t('footer.pro-bono.body.before-author1')"></span>
    <a
      class="rdp-banner-about__outer-link"
      href="https://bsky.app/profile/sylvainegarderet.bsky.social"
      rel="noreferrer nofollow noopener"
    >
      @sylvainegarderet.bsky.social
    </a>
    <span x-html="t('footer.pro-bono.body.between-authors')"></span>
    <a
      class="rdp-banner-about__outer-link"
      href="https://bsky.app/profile/thierry.marianne.io"
      rel="noreferrer nofollow noopener"
    >
      @thierry.marianne.io
    </a>
    <span x-html="t('footer.pro-bono.body.after-author2')"></span>
    <br />
    <a class="rdp-banner-about__outer-link" href="https://netlify.com">
      Netlify
    </a>
    <span x-html="t('footer.pro-bono.body.netlify-suffix')"></span>
    <a
      class="rdp-banner-about__outer-link"
      href="https://www.netlify.com/legal/open-source-policy/"
    >
      <span x-html="t('footer.pro-bono.body.netlify-program')"></span>
    </a>
    <span x-html="t('footer.pro-bono.body.tail')"></span>
  </p>
  <div class="rdp-banner-about__copyright-footer">
    <div class="rdp-banner-about__copyright">
      <span
        x-html="t('footer.copyright.prefix', {
  year: year
})"
      ></span>
      <a
        class="rdp-banner-about__outer-link"
        href="https://twitter.com/CcelestinC"
        rel="noreferrer nofollow noopener"
      >
        @CcelestinC
      </a>
    </div>
  </div>
  <style>
    <span x-html="`
            .rdp-banner-about {
              background: var(--color-content-background);
              color: var(--color-content-font);
              border: none;
              border-radius: var(--radius-default);
              padding: var(--separation-2);
              padding-bottom: var(--separation-3);
              width: 100%;
              margin: 0;
              box-sizing: border-box;
              font-family: 'Roboto', sans-serif;
              font-size: var(--font-size-footer-paragraph);
              line-height: var(--line-height-base);
              overflow: hidden;
            }
            .rdp-banner-about__title {
              color: var(--color-white);
              display: flex;
              align-items: center;
              gap: var(--separation-1);
              font-family: 'Signika', sans-serif;
              font-size: var(--font-size-footer-title);
              line-height: 30px;
              margin: calc(3 * var(--separation-1)) 0 var(--separation-1);
              white-space: nowrap;
              min-width: 0;
            }
            .rdp-banner-about__title > span {
              overflow: hidden;
              text-overflow: ellipsis;
            }
            .rdp-banner-about__title:first-child { margin-top: 0; }
            .rdp-banner-about__paragraph { font-size: 1em; margin: 0 0 var(--separation-1); }
            .rdp-banner-about__paragraph--sharing { margin-bottom: 0; }
            .rdp-banner-about a {
              color: var(--color-white);
              text-decoration: underline;
            }
            .rdp-banner-about__subscribe-to {
              display: inline-flex;
              background: var(--color-brand-bluesky);
              border-radius: 4px;
              padding: 5px var(--separation-0) 4px;
              margin-top: var(--separation-0);
              font-size: var(--font-size-footer-outer-link);
              line-height: var(--line-height-base);
              letter-spacing: 0;
              text-decoration: none;
              color: var(--color-white);
              font-weight: bold;
            }
            .rdp-banner-about__subscription-label { padding-left: var(--separation-0); }
            .rdp-banner-about__copyright-footer {
              color: var(--color-white);
              display: flex;
              width: 100%;
              font-size: var(--font-size-footer-copyright);
              line-height: var(--line-height-base);
              text-align: center;
              margin-top: calc(3 * var(--separation-1));
            }
            .rdp-banner-about__copyright {
              margin: auto;
              margin-bottom: var(--separation-2);
            }
            .rdp-banner-about__copyright .rdp-banner-about__outer-link,
            .rdp-banner-about__copyright-footer .rdp-banner-about__outer-link {
              display: inline-flex;
              margin: auto;
              align-self: center;
              color: var(--color-white);
            }
          `"></span>
  </style>
</footer>
<script>
  document.addEventListener("alpine:init", () => {
    Alpine.data("bannerAbout", () => ({
      get year() {
        return new Date().getFullYear();
      },
      handleLegalClick(event) {
        if (props.onLegalNoticeClick) {
          event.preventDefault();
          props.onLegalNoticeClick();
        }
      },
      handleContactClick(event) {
        if (props.onContactClick) {
          event.preventDefault();
          props.onContactClick();
        }
      },
      handleSupportClick(event) {
        if (props.onSupportClick) {
          event.preventDefault();
          props.onSupportClick();
        }
      },
      handleSourcesClick(event) {
        if (props.onSourcesClick) {
          event.preventDefault();
          props.onSourcesClick();
        }
      },
    }));
  });
</script>
