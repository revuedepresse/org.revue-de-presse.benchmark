<header
  x-data="appHeader()"
  x-bind:class="`rdp-app-header rdp-app-header--${layout}`"
>
  <Logo
    x-bind:showWordmark="true"
    x-bind:size="layout === 'mobile' ? 'sm' : 'md'"
  ></Logo>
  <template x-if="layout === 'desktop'">
    <a
      href="#"
      class="rdp-app-header__myspace"
      x-bind:aria-disabled="!authenticated ? 'true' : undefined"
      x-on:click="if (!authenticated) {
  $event.preventDefault();
  return;
}
onMySpaceClick?.()"
    >
      <span x-html="t('header.my-space')"></span>
    </a>
  </template>
  <button
    type="button"
    class="rdp-app-header__account"
    x-bind:aria-label="t('header.my-account.aria-label')"
    x-on:click="onAccountClick?.()"
  >
    <Icon name="pick-item" x-bind:size="32" x-bind:decorative="true"></Icon>
  </button>
  <style>
    <span x-html="`
            .rdp-app-header {
              display: flex;
              align-items: center;
              gap: var(--separation-2);
              padding: var(--separation-1) var(--separation-2);
              background: var(--color-white);
              border-bottom: 1px solid var(--color-border);
              font-family: 'Signika', sans-serif;
            }
            .rdp-app-header--desktop { padding: var(--separation-1) var(--separation-3); }
            .rdp-app-header__myspace {
              margin-left: auto;
              color: var(--color-brand-active);
              text-decoration: none;
              font-family: 'Roboto', sans-serif;
              font-size: var(--font-size-content);
            }
            .rdp-app-header__myspace[aria-disabled="true"] {
              color: var(--color-light-grey);
              cursor: not-allowed;
              pointer-events: none;
            }
            .rdp-app-header__account {
              background: transparent;
              border: none;
              cursor: pointer;
              width: 40px;
              height: 40px;
              margin-left: auto;
              color: var(--color-content-text);
            }
            .rdp-app-header--desktop .rdp-app-header__account { margin-left: 0; }
          `"></span>
  </style>
</header>
<script>
  document.addEventListener("alpine:init", () => {
    Alpine.data("appHeader", () => ({}));
  });
</script>
