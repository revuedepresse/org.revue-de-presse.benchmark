<div
  x-data="calendarActionBar()"
  x-bind:class="`rdp-calendar-action-bar rdp-calendar-action-bar--${position ?? 'bottom'}`"
>
  <button
    type="button"
    class="rdp-calendar-action-bar__pill"
    x-on:click="onDateClick?.()"
  >
    <span x-html="formatLegacyShortDay(date, locale ?? 'fr-FR')"></span>
  </button>
  <button
    type="button"
    class="rdp-calendar-action-bar__nav"
    x-bind:aria-label="t('actions.previous', undefined, locale ?? 'fr-FR')"
    x-on:click="onPrev?.()"
  >
    ‹
  </button>
  <button
    type="button"
    class="rdp-calendar-action-bar__nav"
    x-bind:aria-label="t('actions.next', undefined, locale ?? 'fr-FR')"
    x-on:click="onNext?.()"
  >
    ›
  </button>
  <style>
    <span x-html="`
            .rdp-calendar-action-bar {
              display: flex;
              gap: var(--separation-1);
              align-items: center;
              background: var(--color-brand-active);
              padding: var(--separation-1) var(--separation-2);
              border-radius: var(--radius-default);
              font-family: 'Roboto', sans-serif;
            }
            .rdp-calendar-action-bar__pill {
              flex: 1;
              background: var(--color-content-background);
              color: var(--color-white);
              padding: var(--separation-1) var(--separation-2);
              border: none;
              border-radius: var(--radius-default);
              font-size: var(--font-size-date-picker);
              cursor: pointer;
            }
            .rdp-calendar-action-bar__nav {
              width: 32px;
              height: 32px;
              border-radius: 50%;
              background: var(--color-white);
              color: var(--color-brand-active);
              border: none;
              cursor: pointer;
              font-size: 20px;
              line-height: 1;
            }
          `"></span>
  </style>
</div>
<script>
  document.addEventListener("alpine:init", () => {
    Alpine.data("calendarActionBar", () => ({}));
  });
</script>
