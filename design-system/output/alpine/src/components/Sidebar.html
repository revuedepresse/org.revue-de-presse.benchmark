<aside class="rdp-sidebar" x-data="sidebar()">
  <Calendar
    x-bind:selectedDate="selectedDate"
    x-bind:locale="locale"
    x-bind:yearRange="yearRange"
    x-bind:minDate="minDate"
    x-on:select="onDateSelect?.(d)"
  ></Calendar>
  <BannerAbout
    x-on:legal-notice-click="onLegalNoticeClick()"
    x-on:contact-click="onContactClick()"
    x-on:support-click="onSupportClick()"
    x-on:sources-click="onSourcesClick()"
  ></BannerAbout>
  <style>
    <span x-html="`
            .rdp-sidebar {
              width: 336px;
              max-width: 100%;
              box-sizing: border-box;
              display: flex;
              flex-direction: column;
              gap: var(--separation-2);
              min-width: 0;
            }
            .rdp-sidebar > * { min-width: 0; max-width: 100%; box-sizing: border-box; }
          `"></span>
  </style>
</aside>
<script>
  document.addEventListener("alpine:init", () => {
    Alpine.data("sidebar", () => ({}));
  });
</script>
