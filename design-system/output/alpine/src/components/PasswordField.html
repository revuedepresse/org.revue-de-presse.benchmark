<div
  class="rdp-textfield"
  x-data="passwordField()"
  x-bind:data-error="error ? 'true' : undefined"
>
  <label class="rdp-textfield__label" x-bind:for="`field-${name}`">
    <span x-html="t(labelKey ?? 'auth.password-label')"></span>
  </label>
  <input
    type="password"
    x-bind:id="`field-${name}`"
    x-bind:autocomplete="mode === 'new' ? 'new-password' : 'current-password'"
    x-bind:name="name"
    x-bind:value="value"
    x-on:input="onChange?.($event.target.value)"
  />
  <template x-if="showHelper ?? mode === 'new'">
    <p class="rdp-textfield__helper">
      <span
        x-html="t('auth.password.helper-text', {
  min: MIN_LENGTH_NO_MFA
})"
      ></span>
    </p>
  </template>
  <style>
    <span x-html="`
            .rdp-textfield { display: flex; flex-direction: column; gap: 4px; font-family: 'Roboto', sans-serif; }
            .rdp-textfield__label {
              font-size: var(--font-size-publication-date);
              color: var(--color-content-text);
              padding-left: var(--separation-1);
            }
            .rdp-textfield__helper {
              font-size: var(--font-size-publication-date);
              color: var(--color-light-grey);
              padding-left: var(--separation-1);
              margin: 0;
            }
            .rdp-textfield input {
              padding: var(--separation-1) var(--separation-2);
              border: 1px solid var(--input-border-default);
              background: var(--input-bg-default);
              color: var(--input-fg-default);
              border-radius: var(--radius-default);
              font-size: var(--font-size-content);
            }
            .rdp-textfield[data-error="true"] input { border-color: var(--input-border-error); }
          `"></span>
  </style>
</div>
<script>
  document.addEventListener("alpine:init", () => {
    Alpine.data("passwordField", () => ({}));
  });
</script>
