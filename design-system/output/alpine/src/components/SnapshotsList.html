<div
  x-data="snapshotsList()"
  x-bind:class="`rdp-snapshots-list rdp-snapshots-list--${presentation ?? 'inline'}`"
>
  <template x-if="presentation === 'sheet'">
    <div
      class="rdp-snapshots-list__scrim"
      aria-hidden="true"
      x-on:click="onDismiss?.()"
    ></div>
  </template>
  <div class="rdp-snapshots-list__panel">
    <header class="rdp-snapshots-list__header">
      <Icon name="pick-list" x-bind:size="24" x-bind:decorative="true"></Icon>
      <span><span x-html="t('snapshots-list.heading')"></span></span>
    </header>
    <template x-if="items.length === 0">
      <p class="rdp-snapshots-list__empty">
        <span x-html="t('snapshots-list.empty')"></span>
      </p>
    </template>
    <template x-if="items.length > 0">
      <ul class="rdp-snapshots-list__items" role="listbox">
        <template x-for="item in items">
          <li
            role="option"
            x-bind:aria-selected="item.id === selectedId ? 'true' : 'false'"
            x-bind:class="`rdp-snapshots-list__item${item.id === selectedId ? ' rdp-snapshots-list__item--selected' : ''}`"
            x-on:click="onSelect?.(item.id)"
          >
            <span x-html="item.label"></span>
          </li>
        </template>
      </ul>
    </template>
  </div>
  <style>
    <span x-html="`
            .rdp-snapshots-list {
              background: var(--color-white);
              border: 1px solid var(--color-border);
              border-radius: var(--radius-default);
              font-family: 'Roboto', sans-serif;
            }
            .rdp-snapshots-list--sheet { position: fixed; inset: 0; display: grid; align-items: end; }
            .rdp-snapshots-list__scrim { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); }
            .rdp-snapshots-list__header {
              display: flex;
              align-items: center;
              gap: var(--separation-1);
              padding: var(--separation-1) var(--separation-2);
              background: var(--color-brand-active);
              color: var(--color-white);
              border-radius: var(--radius-default) var(--radius-default) 0 0;
              font-size: var(--font-size-content);
            }
            .rdp-snapshots-list__items {
              list-style: none;
              margin: 0;
              padding: 0;
              font-size: var(--font-size-content);
            }
            .rdp-snapshots-list__item {
              padding: var(--separation-1) var(--separation-2);
              border-bottom: 1px solid var(--color-border);
              color: var(--color-content-text);
              cursor: pointer;
            }
            .rdp-snapshots-list__item:last-child { border-bottom: none; }
            .rdp-snapshots-list__item--selected {
              background: var(--color-brand-active);
              color: var(--color-white);
            }
            .rdp-snapshots-list__empty {
              padding: var(--separation-2);
              color: var(--color-light-grey);
              font-size: var(--font-size-content);
              margin: 0;
            }
          `"></span>
  </style>
</div>
<script>
  document.addEventListener("alpine:init", () => {
    Alpine.data("snapshotsList", () => ({}));
  });
</script>
