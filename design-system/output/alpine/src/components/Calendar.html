<div
  role="dialog"
  x-data="calendar()"
  x-bind:class="`rdp-calendar rdp-calendar--${presentation ?? 'inline'}`"
  x-bind:aria-modal="presentation === 'sheet' ? 'true' : 'false'"
>
  <template x-if="presentation === 'sheet'">
    <div
      class="rdp-calendar__scrim"
      aria-hidden="true"
      x-on:click="onDismiss?.()"
    ></div>
  </template>
  <div class="rdp-calendar__panel">
    <template x-if="presentation !== 'sheet'">
      <CalendarActionBar
        position="top"
        x-bind:date="focusedDate"
        x-bind:locale="locale"
        x-on:prev="prevDay()"
        x-on:next="nextDay()"
        x-bind:prevDisabled="prevDayDisabled"
        x-bind:nextDisabled="nextDayDisabled"
      ></CalendarActionBar>
    </template>
    <CalendarMonthBar
      x-bind:viewMode="viewMode"
      x-bind:focusedYear="focusedYear"
      x-bind:focusedMonth="focusedMonth"
      x-bind:locale="locale"
      x-on:title-click="titleClick()"
      x-on:prev="prevMonth()"
      x-on:next="nextMonth()"
      x-bind:prevDisabled="prevMonthDisabled"
      x-bind:nextDisabled="nextMonthDisabled"
    ></CalendarMonthBar>
    <template x-if="viewMode === 'day'">
      <DateGrid
        x-bind:year="focusedYear"
        x-bind:month="focusedMonth"
        x-bind:selectedDate="focusedDate"
        x-bind:minDate="minDate"
        x-bind:locale="locale"
        x-on:select="selectDay(d)"
      ></DateGrid>
    </template>
    <template x-if="viewMode === 'month'">
      <MonthPicker
        x-bind:year="focusedYear"
        x-bind:selectedMonth="focusedMonth"
        x-bind:minDate="minDate"
        x-bind:locale="locale"
        x-on:select="selectMonth(idx)"
      ></MonthPicker>
    </template>
    <template x-if="viewMode === 'year'">
      <YearPicker
        x-bind:yearRange="yearRange"
        x-bind:selectedYear="focusedYear"
        x-on:select="selectYear(y)"
      ></YearPicker>
    </template>
  </div>
  <style>
    <span x-html="`
            .rdp-calendar { font-family: 'Roboto', sans-serif; }
            .rdp-calendar--inline {
              background: var(--color-white);
              border: 1px solid var(--color-border);
              border-radius: var(--radius-default);
              padding: 0;
            }
            .rdp-calendar--sheet { position: fixed; inset: 0; display: grid; align-items: end; }
            .rdp-calendar__scrim { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); }
            .rdp-calendar--sheet .rdp-calendar__panel {
              position: relative;
              background: var(--color-white);
              padding: var(--separation-2);
              border-radius: var(--radius-default) var(--radius-default) 0 0;
            }
          `"></span>
  </style>
</div>
<script>
  document.addEventListener("alpine:init", () => {
    Alpine.data("calendar", () => ({
      viewMode: "day",
      focusedDate: new Date(),
      focusedYear: 0,
      focusedMonth: 0,
      initialised: false,
      selectDay(d) {
        this.focusedDate = d;
        this.focusedYear = d.getFullYear();
        this.focusedMonth = d.getMonth();
        props.onSelect?.(d);
      },
      selectMonth(idx) {
        this.focusedMonth = idx;
        this.viewMode = "day";
      },
      selectYear(y) {
        this.focusedYear = y;
        this.viewMode = "month";
      },
      prevDay() {
        const next = new Date(this.focusedDate);
        next.setDate(next.getDate() - 1);
        this.focusedDate = next;
        this.focusedYear = next.getFullYear();
        this.focusedMonth = next.getMonth();
      },
      nextDay() {
        const next = new Date(this.focusedDate);
        next.setDate(next.getDate() + 1);
        this.focusedDate = next;
        this.focusedYear = next.getFullYear();
        this.focusedMonth = next.getMonth();
      },
      prevMonth() {
        if (this.viewMode === "year") {
          const next = this.focusedYear - 1;
          if (next >= props.yearRange.min) this.focusedYear = next;
          return;
        }
        const m = this.focusedMonth - 1;
        if (m < 0) {
          this.focusedMonth = 11;
          this.focusedYear -= 1;
        } else {
          this.focusedMonth = m;
        }
      },
      nextMonth() {
        if (this.viewMode === "year") {
          const next = this.focusedYear + 1;
          if (next <= props.yearRange.max) this.focusedYear = next;
          return;
        }
        const m = this.focusedMonth + 1;
        if (m > 11) {
          this.focusedMonth = 0;
          this.focusedYear += 1;
        } else {
          this.focusedMonth = m;
        }
      },
      titleClick() {
        if (this.viewMode === "day") {
          this.viewMode = "month";
        } else if (this.viewMode === "month") {
          this.viewMode = "year";
        }
      },
      get prevDayDisabled() {
        if (!props.minDate) return false;
        const cur = new Date(
          this.focusedDate.getFullYear(),
          this.focusedDate.getMonth(),
          this.focusedDate.getDate()
        );
        const min = new Date(
          props.minDate.getFullYear(),
          props.minDate.getMonth(),
          props.minDate.getDate()
        );
        return cur.getTime() <= min.getTime();
      },
      get nextDayDisabled() {
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        yesterday.setHours(0, 0, 0, 0);
        const cur = new Date(
          this.focusedDate.getFullYear(),
          this.focusedDate.getMonth(),
          this.focusedDate.getDate()
        );
        return cur.getTime() >= yesterday.getTime();
      },
      get prevMonthDisabled() {
        if (this.viewMode === "year") {
          if (!props.yearRange) return false;
          return this.focusedYear <= props.yearRange.min;
        }
        if (!props.minDate) return false;
        const minY = props.minDate.getFullYear();
        const minM = props.minDate.getMonth();
        if (this.focusedYear < minY) return true;
        if (this.focusedYear > minY) return false;
        return this.focusedMonth <= minM;
      },
      get nextMonthDisabled() {
        const today = new Date();
        const curY = today.getFullYear();
        const curM = today.getMonth();
        if (this.viewMode === "year") {
          if (!props.yearRange) return false;
          return this.focusedYear >= props.yearRange.max;
        }
        if (this.focusedYear > curY) return true;
        if (this.focusedYear < curY) return false;
        return this.focusedMonth >= curM;
      },
      init() {
        this.focusedDate = props.selectedDate;
        this.focusedYear = props.selectedDate.getFullYear();
        this.focusedMonth = props.selectedDate.getMonth();
        this.initialised = true;
      },
    }));
  });
</script>
