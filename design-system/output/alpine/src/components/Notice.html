<div class="rdp-notice" role="status" x-data="notice()">
  <h2 class="rdp-notice__headline">
    <span x-html="t(headlineKey, headlineVars)"></span>
  </h2>
  <p class="rdp-notice__body"><span x-html="t(bodyKey, bodyVars)"></span></p>
  <style>
    <span x-html="`
            .rdp-notice {
              background: var(--color-white);
              padding: var(--separation-3);
              border-radius: var(--radius-default);
              font-family: 'Roboto', sans-serif;
              color: var(--color-content-text);
              max-width: 360px;
            }
            .rdp-notice__headline {
              margin: 0 0 var(--separation-1);
              font-family: 'Signika', sans-serif;
              font-size: var(--font-size-status-text);
              color: var(--color-vanity-metric-like);
            }
            .rdp-notice__body { margin: 0; font-size: var(--font-size-content); }
          `"></span>
  </style>
</div>
<script>
  document.addEventListener("alpine:init", () => {
    Alpine.data("notice", () => ({}));
  });
</script>
