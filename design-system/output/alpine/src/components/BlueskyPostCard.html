<article class="rdp-bsky-post" x-data="blueskyPostCard()">
  <MetricsBar
    x-bind:replies="post.metrics.replies"
    x-bind:reposts="post.metrics.reposts"
    x-bind:likes="post.metrics.likes"
    x-bind:locale="locale"
  ></MetricsBar>
  <header class="rdp-bsky-post__header">
    <span class="rdp-bsky-post__avatar" aria-hidden="true">
      <template x-if="!!post.authorAvatarUrl">
        <img alt="" x-bind:src="post.authorAvatarUrl" />
      </template>
    </span>
    <span class="rdp-bsky-post__author">
      <strong><span x-html="post.authorName"></span></strong>
      <span class="rdp-bsky-post__handle">
        <span x-html="t('bluesky.handle.prefix')"></span>
        <span x-html="post.authorHandle"></span>
      </span>
    </span>
  </header>
  <p class="rdp-bsky-post__body"><span x-html="post.body"></span></p>
  <template x-if="!!post.hasMedia">
    <MediaPlaceholder x-bind:width="270" x-bind:height="160"></MediaPlaceholder>
  </template>
  <footer class="rdp-bsky-post__footer">
    <time class="rdp-bsky-post__timestamp">
      <span
        x-html="formatDate(post.publishedAt, 'longDay', locale ?? 'fr-FR')"
      ></span>
    </time>
    <WebIntents x-bind:postId="post.id"></WebIntents>
  </footer>
  <style>
    <span x-html="`
            .rdp-bsky-post {
              background: var(--color-white);
              border: 1px solid var(--color-border);
              border-radius: var(--radius-default);
              padding: var(--separation-2);
              font-family: 'Roboto', sans-serif;
              color: var(--color-content-text);
              display: flex;
              flex-direction: column;
              gap: var(--separation-1);
              font-size: var(--font-size-status-text);
            }
            .rdp-bsky-post__header {
              display: flex;
              gap: var(--separation-1);
              align-items: center;
              font-size: var(--font-size-content);
            }
            .rdp-bsky-post__avatar {
              width: 48px;
              height: 48px;
              border-radius: 50%;
              background: var(--color-light-grey);
              overflow: hidden;
              flex-shrink: 0;
            }
            .rdp-bsky-post__avatar img { width: 100%; height: 100%; object-fit: cover; }
            .rdp-bsky-post__author { display: flex; flex-direction: column; }
            .rdp-bsky-post__handle {
              color: var(--color-light-grey);
              font-size: var(--font-size-publication-date);
            }
            .rdp-bsky-post__body { margin: 0; }
            .rdp-bsky-post__footer {
              display: flex;
              justify-content: space-between;
              align-items: center;
              font-size: var(--font-size-publication-date);
              color: var(--color-light-grey);
            }
          `"></span>
  </style>
</article>
<script>
  document.addEventListener("alpine:init", () => {
    Alpine.data("blueskyPostCard", () => ({}));
  });
</script>
