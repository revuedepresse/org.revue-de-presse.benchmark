<div x-data="app()" x-bind:class="`rdp-app rdp-app--${layout ?? 'desktop'}`">
  <AppHeader
    x-bind:layout="layout ?? 'desktop'"
    x-bind:authenticated="authenticated ?? false"
    x-on:account-click="onAccountClick?.()"
    x-on:my-space-click="onMySpaceClick?.()"
  ></AppHeader>
  <template x-if="showPopularNews === true">
    <p class="rdp-app__popular-news"><span x-html="popularNewsLine"></span></p>
  </template>
  <template x-if="(layout ?? 'desktop') === 'desktop'">
    <div class="rdp-app__content">
      <aside class="rdp-app__column">
        <Sidebar
          x-bind:lists="lists"
          x-bind:selectedListId="selectedListId"
          x-bind:selectedDate="pickedDate"
          x-bind:yearRange="yearRange"
          x-bind:locale="locale"
          x-on:list-select="onListSelect?.(id)"
          x-on:date-select="onDateSelect?.(d)"
          x-on:legal-notice-click="goTo('legal')"
          x-on:contact-click="goTo('contact')"
          x-on:support-click="goTo('support')"
          x-on:sources-click="goTo('sources')"
        ></Sidebar>
      </aside>
      <main
        class="rdp-app__main"
        x-bind:aria-busy="loading ? 'true' : undefined"
      >
        <template x-if="currentView !== 'main'">
          <button type="button" class="rdp-app__back" x-on:click="goTo('main')">
            ← Retour aux publications
          </button>
        </template>
        <template
          x-if="currentView === 'main' && !loading && posts.length === 0"
        >
          <Alert
            variant="empty"
            x-bind:messageKey="emptyMessageKey ?? 'alert.empty.no-content-for-date'"
          ></Alert>
        </template>
        <template x-if="currentView === 'main' && posts.length > 0">
          <ol class="rdp-app__post-list">
            <template x-for="post in posts">
              <li class="rdp-app__post-item">
                <BlueskyPostCard
                  x-bind:post="post"
                  x-bind:locale="locale"
                ></BlueskyPostCard>
              </li>
            </template>
          </ol>
        </template>
        <template x-if="currentView === 'legal'">
          <LegalNoticePage></LegalNoticePage>
        </template>
        <template x-if="currentView === 'contact'">
          <ContactPage></ContactPage>
        </template>
        <template x-if="currentView === 'support'">
          <SupportPage></SupportPage>
        </template>
        <template x-if="currentView === 'sources'">
          <SourcesPage></SourcesPage>
        </template>
      </main>
    </div>
  </template>
  <template x-if="(layout ?? 'desktop') === 'mobile'">
    <main
      class="rdp-app__mobile-main"
      x-bind:aria-busy="loading ? 'true' : undefined"
    >
      <template x-if="currentView !== 'main'">
        <button type="button" class="rdp-app__back" x-on:click="goTo('main')">
          ← Retour aux publications
        </button>
      </template>
      <template x-if="currentView === 'main' && !loading && posts.length === 0">
        <Alert
          variant="empty"
          x-bind:messageKey="emptyMessageKey ?? 'alert.empty.no-content-for-date'"
        ></Alert>
      </template>
      <template x-if="currentView === 'main' && posts.length > 0">
        <ol class="rdp-app__post-list">
          <template x-for="post in posts">
            <li class="rdp-app__post-item">
              <BlueskyPostCard
                x-bind:post="post"
                x-bind:locale="locale"
              ></BlueskyPostCard>
            </li>
          </template>
        </ol>
      </template>
      <template x-if="currentView === 'legal'">
        <LegalNoticePage></LegalNoticePage>
      </template>
      <template x-if="currentView === 'contact'">
        <ContactPage></ContactPage>
      </template>
      <template x-if="currentView === 'support'">
        <SupportPage></SupportPage>
      </template>
      <template x-if="currentView === 'sources'">
        <SourcesPage></SourcesPage>
      </template>
      <BannerAbout
        x-on:legal-notice-click="goTo('legal')"
        x-on:contact-click="goTo('contact')"
        x-on:support-click="goTo('support')"
        x-on:sources-click="goTo('sources')"
      ></BannerAbout>
    </main>
    <template x-if="isCalendarOpen">
      <Calendar
        presentation="sheet"
        x-bind:selectedDate="focusedDate"
        x-bind:locale="locale"
        x-bind:yearRange="yearRange"
        x-on:select="pickFromCalendar(d)"
        x-on:dismiss="closeCalendar()"
      ></Calendar>
    </template>
    <div class="rdp-app__mobile-dock">
      <CalendarActionBar
        position="bottom"
        x-bind:date="focusedDate"
        x-bind:locale="locale"
        x-on:pill-click="openCalendar()"
        x-on:prev="prevDay()"
        x-on:next="nextDay()"
      ></CalendarActionBar>
    </div>
  </template>
  <style>
    <span x-html="`
            .rdp-app {
              background: var(--color-taupe-grey);
              min-height: 100vh;
              font-family: 'Roboto', sans-serif;
              color: var(--color-content-text);
            }
            /* Both layouts cap at a max-width so the app stays centred on wider
               viewports. Desktop tracks the legacy $width-extra-large-device
               (1200px); mobile tracks a comfortable phone width (480px). */
            .rdp-app--desktop {
              max-width: 1200px;
              margin: 0 auto;
            }
            .rdp-app--mobile {
              max-width: 480px;
              margin: 0 auto;
            }
            .rdp-app__popular-news {
              margin: 0;
              padding: var(--separation-1) var(--separation-2);
              font-family: 'Signika', sans-serif;
              font-size: var(--font-size-content);
              color: var(--color-brand);
              background: var(--color-white);
              border-bottom: 1px solid var(--color-border);
              text-align: center;
            }
            .rdp-app__content {
              display: grid;
              grid-template-columns: 1fr;
              gap: var(--separation-2);
              padding: var(--separation-2);
              margin: 0 auto;
              box-sizing: border-box;
            }
            .rdp-app--desktop .rdp-app__content {
              grid-template-columns: 336px 1fr;
              align-items: start;
            }
            .rdp-app__main,
            .rdp-app__mobile-main {
              min-width: 0;
              display: flex;
              flex-direction: column;
              gap: var(--separation-2);
            }
            .rdp-app__mobile-main {
              padding: var(--separation-2);
              padding-bottom: calc(64px + var(--separation-2));
            }
            .rdp-app__post-list {
              list-style: none;
              margin: 0;
              padding: 0;
              display: flex;
              flex-direction: column;
              gap: var(--separation-2);
            }
            .rdp-app__post-item { margin: 0; }
            .rdp-app__back {
              align-self: flex-start;
              background: var(--color-white);
              border: 1px solid var(--color-brand);
              border-radius: var(--radius-default);
              color: var(--color-brand);
              padding: var(--separation-1) var(--separation-2);
              font-family: 'Roboto', sans-serif;
              font-size: var(--font-size-content);
              cursor: pointer;
            }
            .rdp-app__back:hover { background: var(--color-brand); color: var(--color-white); }
            .rdp-app__column {
              min-width: 0;
            }
            .rdp-app--mobile { --rdp-mobile-dock-height: 67px; }
            /* Fixed dock + calendar sheet stay centred at the same max-width as
               the mobile column so a desktop browser previewing the mobile
               variant doesn't show full-viewport bottom UI. */
            .rdp-app__mobile-dock {
              position: fixed;
              left: 50%;
              transform: translateX(-50%);
              width: 100%;
              max-width: 480px;
              bottom: 0;
              height: var(--rdp-mobile-dock-height);
              box-sizing: border-box;
              background: var(--color-white);
              border-top: 1px solid var(--color-border);
              padding: var(--separation-1) var(--separation-2);
              z-index: 20;
              box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.08);
            }
            .rdp-app--mobile .rdp-calendar--sheet {
              left: 50%;
              right: auto;
              transform: translateX(-50%);
              width: 100%;
              max-width: 480px;
              padding-bottom: var(--rdp-mobile-dock-height);
            }
            .rdp-app--mobile .rdp-calendar__scrim {
              left: 50%;
              right: auto;
              transform: translateX(-50%);
              width: 100%;
              max-width: 480px;
              bottom: var(--rdp-mobile-dock-height);
            }
          `"></span>
  </style>
</div>
<script>
  document.addEventListener("alpine:init", () => {
    Alpine.data("app", () => ({
      focusedDate: new Date(),
      isCalendarOpen: false,
      currentView: "main",
      initialised: false,
      get popularNewsLine() {
        return t(
          "header.popular-news",
          {
            date: formatLegacyShortDay(
              props.pickedDate,
              props.locale ?? "fr-FR"
            ),
          },
          props.locale ?? "fr-FR"
        );
      },
      prevDay() {
        const next = new Date(this.focusedDate);
        next.setDate(next.getDate() - 1);
        this.focusedDate = next;
        props.onDateSelect?.(next);
      },
      nextDay() {
        const next = new Date(this.focusedDate);
        next.setDate(next.getDate() + 1);
        this.focusedDate = next;
        props.onDateSelect?.(next);
      },
      openCalendar() {
        this.isCalendarOpen = true;
      },
      closeCalendar() {
        this.isCalendarOpen = false;
      },
      pickFromCalendar(d) {
        this.focusedDate = d;
        this.isCalendarOpen = false;
        props.onDateSelect?.(d);
      },
      goTo(view) {
        this.currentView = view;
      },
      init() {
        this.focusedDate = props.pickedDate;
        this.initialised = true;
      },
    }));
  });
</script>
