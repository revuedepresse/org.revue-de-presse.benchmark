<ul class="rdp-year-picker" role="listbox" x-data="yearPicker()">
  <template x-for="y in years">
    <li
      role="option"
      x-bind:aria-selected="y === selectedYear ? 'true' : 'false'"
      x-bind:class="`rdp-year-picker__item${y === selectedYear ? ' rdp-year-picker__item--selected' : ''}`"
      x-on:click="onSelect?.(y)"
    >
      <span x-html="y"></span>
    </li>
  </template>
  <style>
    <span x-html="`
            .rdp-year-picker {
              list-style: none; margin: 0; padding: 0;
              background: var(--color-white);
              border: 1px solid var(--color-border);
              border-radius: var(--radius-default);
              font-family: 'Roboto', sans-serif;
              font-size: var(--font-size-content);
            }
            .rdp-year-picker__item {
              padding: var(--separation-1) var(--separation-2);
              color: var(--color-content-text);
              cursor: pointer;
              border-bottom: 1px solid var(--color-border);
              text-align: center;
            }
            .rdp-year-picker__item:last-child { border-bottom: none; }
            .rdp-year-picker__item--selected {
              background: var(--color-brand-active);
              color: var(--color-white);
            }
          `"></span>
  </style>
</ul>
<script>
  document.addEventListener("alpine:init", () => {
    Alpine.data("yearPicker", () => ({
      get years() {
        return Array.from(
          {
            length: props.yearRange.max - props.yearRange.min + 1,
          },
          (_, i) => props.yearRange.min + i
        );
      },
    }));
  });
</script>
