<ul
  class="rdp-month-picker"
  role="listbox"
  x-data="monthPicker()"
  x-bind:aria-label="t('calendar.heading.year', {
  year: year
})"
>
  <template x-for="name in months">
    <li
      role="option"
      x-bind:aria-selected="index === selectedMonth ? 'true' : 'false'"
      x-bind:aria-disabled="isDisabled(index) ? 'true' : undefined"
      x-bind:data-future="isDisabled(index) ? 'true' : undefined"
      x-bind:class="`rdp-month-picker__item${index === selectedMonth ? ' rdp-month-picker__item--selected' : ''}`"
      x-on:click="if (!isDisabled(index)) onSelect?.(index)"
    >
      <span x-html="name"></span>
    </li>
  </template>
  <style>
    <span x-html="`
            .rdp-month-picker {
              list-style: none;
              margin: 0 var(--separation-2) var(--separation-2);
              margin-left: calc(2 * var(--separation-2));
              padding: 0;
              background: var(--color-white);
              border: 1px solid var(--color-brand);
              border-radius: var(--radius-default);
              font-family: 'Roboto', sans-serif;
              font-size: var(--font-size-content);
            }
            .rdp-month-picker__item {
              padding: var(--separation-1) var(--separation-2);
              color: var(--color-brand);
              cursor: pointer;
              border-bottom: 1px solid var(--color-brand);
            }
            .rdp-month-picker__item:last-child { border-bottom: none; }
            .rdp-month-picker__item[data-future="true"] {
              color: var(--color-light-grey);
              background: var(--color-background-other-month);
              cursor: not-allowed;
            }
            .rdp-month-picker__item--selected {
              background: var(--color-brand);
              color: var(--color-white);
            }
          `"></span>
  </style>
</ul>
<script>
  document.addEventListener("alpine:init", () => {
    Alpine.data("monthPicker", () => ({
      get months() {
        return Array.from(
          {
            length: 12,
          },
          (_, i) => localizedMonthLong(i, props.locale ?? "fr-FR")
        );
      },
      isFuture(monthIndex) {
        const today = new Date();
        const currentYear = today.getFullYear();
        const currentMonth = today.getMonth();
        if (props.year > currentYear) return true;
        if (props.year < currentYear) return false;
        return monthIndex > currentMonth;
      },
      isBeforeMin(monthIndex) {
        if (!props.minDate) return false;
        const minYear = props.minDate.getFullYear();
        const minMonth = props.minDate.getMonth();
        if (props.year < minYear) return true;
        if (props.year > minYear) return false;
        return monthIndex < minMonth;
      },
      isDisabled(monthIndex) {
        return this.isFuture(monthIndex) || this.isBeforeMin(monthIndex);
      },
    }));
  });
</script>
