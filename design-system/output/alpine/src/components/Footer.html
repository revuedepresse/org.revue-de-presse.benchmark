<footer class="rdp-footer" x-data="footer()">
  <section class="rdp-footer__section">
    <h3><span x-html="t('footer.about.heading')"></span></h3>
    <p><span x-html="t('footer.about.body')"></span></p>
  </section>
  <section class="rdp-footer__section">
    <h3><span x-html="t('footer.social.heading')"></span></h3>
    <p><span x-html="t('footer.social.body')"></span></p>
  </section>
  <section class="rdp-footer__section">
    <h3><span x-html="t('footer.pro-bono.heading')"></span></h3>
    <p><span x-html="t('footer.pro-bono.body')"></span></p>
  </section>
  <p class="rdp-footer__copyright">
    <span
      x-html="t('footer.copyright', {
  year: year
})"
    ></span>
  </p>
  <style>
    <span x-html="`
            .rdp-footer {
              background: var(--banner-about-bg);
              color: var(--banner-about-fg);
              padding: var(--separation-2);
              font-family: 'Roboto', sans-serif;
              font-size: var(--font-size-footer-paragraph);
              display: grid;
              gap: var(--separation-2);
            }
            .rdp-footer__section h3 {
              font-family: 'Signika', sans-serif;
              font-size: var(--font-size-footer-title);
              color: var(--color-brand-active);
              margin: 0 0 var(--separation-1);
            }
            .rdp-footer__section p { margin: 0; }
            .rdp-footer__copyright {
              font-size: var(--font-size-footer-copyright);
              text-align: center;
              margin: 0;
              color: var(--color-content-font);
            }
          `"></span>
  </style>
</footer>
<script>
  document.addEventListener("alpine:init", () => {
    Alpine.data("footer", () => ({
      get year() {
        return new Date().getFullYear();
      },
    }));
  });
</script>
