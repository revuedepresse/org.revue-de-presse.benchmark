<div class="rdp-web-intents" x-data="webIntents()">
  <button
    type="button"
    class="rdp-web-intents__btn"
    x-bind:aria-label="t('web-intents.reply.aria-label')"
    x-on:click="onReply?.(postId)"
  >
    <Icon name="reply" x-bind:size="24" x-bind:decorative="true"></Icon>
  </button>
  <button
    type="button"
    class="rdp-web-intents__btn"
    x-bind:aria-label="t('web-intents.repost.aria-label')"
    x-on:click="onRepost?.(postId)"
  >
    <Icon name="retweet" x-bind:size="24" x-bind:decorative="true"></Icon>
  </button>
  <button
    type="button"
    class="rdp-web-intents__btn"
    x-bind:aria-label="t('web-intents.like.aria-label')"
    x-on:click="onLike?.(postId)"
  >
    <Icon name="like-intent" x-bind:size="24" x-bind:decorative="true"></Icon>
  </button>
  <button
    type="button"
    class="rdp-web-intents__btn"
    x-bind:aria-label="t('web-intents.share.aria-label')"
    x-on:click="onShare?.(postId)"
  >
    <Icon name="share" x-bind:size="24" x-bind:decorative="true"></Icon>
  </button>
  <style>
    <span x-html="`
            .rdp-web-intents { display: inline-flex; gap: var(--separation-2); }
            .rdp-web-intents__btn {
              display: inline-flex;
              align-items: center;
              justify-content: center;
              width: 24px;
              height: 24px;
              padding: 0;
              background: transparent;
              border: none;
              cursor: pointer;
            }
          `"></span>
  </style>
</div>
<script>
  document.addEventListener("alpine:init", () => {
    Alpine.data("webIntents", () => ({}));
  });
</script>
