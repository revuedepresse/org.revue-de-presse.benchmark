<table class="rdp-date-grid" role="grid" x-data="dateGrid()">
  <thead>
    <tr>
      <template x-for="w in weekdays">
        <th scope="col" class="rdp-date-grid__weekday">
          <span
            x-html="t(`calendar.weekdays.short.${w}`, undefined, locale ?? 'fr-FR')"
          ></span>
        </th>
      </template>
    </tr>
  </thead>
  <tbody>
    <template x-for="row in rows">
      <tr>
        <template x-for="d in row">
          <td
            role="gridcell"
            x-bind:aria-selected="isSelected(d) ? 'true' : 'false'"
            x-bind:aria-disabled="isFuture(d) ? 'true' : undefined"
            x-bind:data-other-month="d.getMonth() !== month ? 'true' : undefined"
            x-bind:data-future="isFuture(d) ? 'true' : undefined"
            x-bind:class="`rdp-date-grid__cell${isSelected(d) ? ' rdp-date-grid__cell--selected' : ''}`"
            x-on:click="if (!isFuture(d)) onSelect?.(d)"
          >
            <span x-html="d.getDate()"></span>
          </td>
        </template>
      </tr>
    </template>
  </tbody>
  <style>
    <span x-html="`
            .rdp-date-grid {
              width: 100%;
              table-layout: fixed;
              border-collapse: separate;
              border-spacing: 2px;
              font-family: 'Roboto', sans-serif;
              font-size: var(--font-size-calendar-month-day-cell);
            }
            .rdp-date-grid__weekday {
              font-weight: normal;
              font-size: var(--font-size-calendar-month-day);
              color: var(--color-brand);
              padding: 4px 0;
              text-align: center;
            }
            .rdp-date-grid__cell {
              padding: 6px 0;
              border: 1px solid var(--color-border);
              border-radius: var(--radius-selectable);
              color: var(--color-content-text);
              background: var(--color-background-future-date);
              cursor: pointer;
              text-align: center;
            }
            .rdp-date-grid__cell[data-other-month="true"] {
              background: var(--color-background-other-month);
              color: var(--color-light-grey);
            }
            .rdp-date-grid__cell[data-future="true"] {
              color: var(--color-light-grey);
              background: var(--color-background-other-month);
              cursor: not-allowed;
            }
            .rdp-date-grid__cell--selected {
              background: var(--color-brand);
              color: var(--color-white);
              border-color: var(--color-brand);
            }
          `"></span>
  </style>
</table>
<script>
  document.addEventListener("alpine:init", () => {
    Alpine.data("dateGrid", () => ({
      weekdays: [
        "monday",
        "tuesday",
        "wednesday",
        "thursday",
        "friday",
        "saturday",
        "sunday",
      ],
      get rows() {
        const first = new Date(props.year, props.month, 1);
        const offset = (first.getDay() + 6) % 7;
        const start = new Date(props.year, props.month, 1 - offset);
        const all = Array.from(
          {
            length: 42,
          },
          (_, i) =>
            new Date(start.getFullYear(), start.getMonth(), start.getDate() + i)
        );
        return [0, 1, 2, 3, 4, 5].map((row) => all.slice(row * 7, row * 7 + 7));
      },
      isSelected(d) {
        const sel = props.selectedDate;
        return (
          !!sel &&
          sel.getFullYear() === d.getFullYear() &&
          sel.getMonth() === d.getMonth() &&
          sel.getDate() === d.getDate()
        );
      },
      isFuture(d) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const cell = new Date(d.getFullYear(), d.getMonth(), d.getDate());
        return cell.getTime() > today.getTime();
      },
    }));
  });
</script>
